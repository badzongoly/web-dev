<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        header{
            background-color: #333;
            color: white;
            padding: 10px;
        }
        main{
            margin: 20px;
        }
        footer{
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        form{
            display: flex;
            flex-direction: column;
            max-width: 400px;
        }
        label{
            margin-bottom: 5px;
        }
        input[type="text"]{
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"]{
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="number"]{
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"]:hover{
            background-color: #555;
        }

    </style>
</head>
<body>
    <header>
        <h1>HTML Forms</h1>
    </header>
    <main>
        <form method="post" action="process.php">
           <label for="firstName">First Name:</label> <input type="text" name="firstName"  id=""><br>
            <label for="lastName">Last Name:</label> <input type="text" name="lastName"><br>
            <label for="middleName">Middle Name:</label> <input type="text" name="middleName"><br>
            <label for="age">Age:</label> <input type="number" name="age"><br>
            <label for="email">E-mail:</label> <input type="text" name="email"><br>
            <input type="submit">
        </form>
    </main>
    <footer>
        <p>Copyright &copy; 2024</p>
    </footer>
</body>
</html>
