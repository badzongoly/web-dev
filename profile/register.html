<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header, footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        main {
            padding: 20px;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            margin-top: 10px;
        }
        input[type="text"], input[type="email"], select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        </style>
</head>
<body>
    <header>
        <h1>Register</h1>
    </header>
    <main>
        <form action="submitted.html" method="post" style="display: grid;">
            <label for="">First Name:</label>
            <input type="text" name="firstName" value="" placeholder="Eg Rajan" required>

            <label for="">Last Name:</label>
            <input type="text" name="lastName" required>

            <label for="">Gender:</label>
            <select name="gender" required>
                <option value="">Select</option>    
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <label for="">Email:</label>
            <input type="email" name="email" required>

            <label for="">Check All Courses to Register:</label>
            <input type="checkbox" name="course" value="python">Python
            <input type="checkbox" name="course" value="java">Java  
            <input type="checkbox" name="course" value="c++">C++
            <input type="checkbox" name="course" value="javascript">JavaScript

            <label for="">Are you Danish</label>
            <input type="radio" name="danish" value="yes">Yes
            <input type="radio" name="danish" value="no">No

            <label for="">Additional Comments:</label>
            <textarea name="comments" rows="4" cols="50" placeholder="Enter any additional information here...">

            </textarea>

            <button type="submit">Submit</button>


          

        </form>

    </main>
    <footer>
        <p>&copy; 2024 EB. All rights reserved.</p>
    </footer>
</body>
</html>
